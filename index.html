<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Dokumentáció Megjelenítő</title>
    <style>
        body {
            background: #e9ecef;
            display: flex;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
        }
        .paper {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 850px;
            width: 100%;
            border-left: 10px solid #2c3e50;
        }
        /* A lényeg: megőrzi a TXT formázását, de szép betűvel */
        #output {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Consolas', 'Monaco', monospace; /* Programozói stílus, olvashatóbb */
            font-size: 15px;
            line-height: 1.6;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="paper">
    <div id="output">Betöltés...</div>
</div>

<script>
    // Betöltjük a TXT fájlt
    fetch('text.md')
        .then(response => {
            if (!response.ok) throw new Error('A fájl nem található!');
            return response.text();
        })
        .then(data => {
            // Beillesztjük a szöveget a div-be
            document.getElementById('output').textContent = data;
        })
        .catch(err => {
            document.getElementById('output').innerHTML = "<span style='color:red'>Hiba: " + err.message + "</span>";
        });
</script>

</body>
</html>
