<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Saját GPT Dokumentáció</title>
    <style>
        body {
            background-color: #343541; /* GPT sötét háttér */
            color: #ececf1;
            font-family: 'Söhne', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .chat-bubble {
            max-width: 800px;
            width: 100%;
            background-color: #444654; /* GPT üzenet háttér */
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 1px solid #565869;
        }
        /* A szöveg formázása JS nélkül */
        #output {
            white-space: pre-wrap;       /* Megőrzi a tördelést */
            word-wrap: break-word;
            font-family: 'Consolas', monospace; /* Kód jellegű betűk */
            font-size: 14px;
            line-height: 1.6;
            color: #d1d1d1;
        }
        .header {
            color: #10a37f; /* GPT zöld */
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #565869;
            padding-bottom: 10px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

<div class="chat-bubble">
    <div class="header">Renault Grand Scenic - Műszaki Napló</div>
    <div id="output">Betöltés...</div>
</div>

<script>
    // Sima TXT fájlt töltünk be, amihez nem kell külön könyvtár
    fetch('text.txt')
        .then(response => {
            if (!response.ok) throw new Error('A text.txt nem található a szerveren!');
            return response.text();
        })
        .then(data => {
            document.getElementById('output').textContent = data;
        })
        .catch(err => {
            document.getElementById('output').innerHTML = "Hiba: " + err.message;
        });
</script>

</body>
</html>
