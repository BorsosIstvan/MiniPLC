<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Saját GPT Dokumentáció</title>
    <!-- Ez egy megbízhatóbb forrás, de ha ez is blokkolva van, töltsd le a fájlt! -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body {
            background-color: #343541; /* GPT sötét háttér */
            color: #ececf1;
            font-family: 'Söhne', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            background-color: #444654; /* Üzenet háttér */
            padding: 30px;
            border-radius: 8px;
            line-height: 1.6;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        /* Markdown stílusok */
        h1, h2 { color: #fff; border-bottom: 1px solid #666; padding-bottom: 10px; }
        code { background-color: #000; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        pre { background-color: #000; padding: 15px; border-radius: 8px; overflow-x: auto; }
        blockquote { border-left: 4px solid #10a37f; padding-left: 15px; color: #acacbe; font-style: italic; }
        strong { color: #10a37f; } /* GPT zöld kiemelés */
    </style>
</head>
<body>

<div class="chat-container" id="content">
    Betöltés...
</div>

<script>
    async function loadGPTStyle() {
        try {
            const response = await fetch('text.md');
            if (!response.ok) throw new Error('Nem található a text.md');
            const markdown = await response.text();
            
            // Markdown -> HTML átalakítás
            document.getElementById('content').innerHTML = marked.parse(markdown);
        } catch (err) {
            document.getElementById('content').innerHTML = "Hiba történt: " + err.message;
        }
    }
    loadGPTStyle();
</script>

</body>
</html>
